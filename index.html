<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <script>
        L_NO_TOUCH = false;
        L_DISABLE_3D = false;
    </script>
    
    <style>html, body {width: 100%;height: 100%;margin: 0;padding: 0;}</style>
    <style>#map {position:absolute;top:0;bottom:0;right:0;left:0;}</style>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/bootstrap/3.0.0/css/bootstrap-glyphicons.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.2.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/python-visualization/folium/folium/templates/leaflet.awesome.rotate.min.css"/>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        #map_befff7fd11199784079e61338f4d633f {
            position: relative;
            width: 100.0%;
            height: 100.0%;
            left: 0.0%;
            top: 0.0%;
        }
        .leaflet-container { font-size: 1rem; }
    </style>
</head>
<body>
    <div class="folium-map" id="map_befff7fd11199784079e61338f4d633f" ></div>
</body>
<script>
    // 1. マップの中心座標を「東京（[35.6895, 139.6917]）」に変更しました
    var map_befff7fd11199784079e61338f4d633f = L.map(
        "map_befff7fd11199784079e61338f4d633f",
        {
            center: [35.6895, 139.6917], 
            crs: L.CRS.EPSG3857,
            zoom: 12, // 東京全体が見やすくなるようにズームを「12」に微調整しています
            zoomControl: true,
            preferCanvas: false,
        }
    );

    var tile_layer_0b29862e96a1f5c6c48ccd35d941cb97 = L.tileLayer(
        "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            minZoom: 0,
            maxZoom: 19,
            maxNativeZoom: 19,
            noWrap: false,
            attribution: "\u0026copy; \u003ca href=\"https://www.openstreetmap.org/copyright\"\u003eOpenStreetMap\u003c/a\u003e contributors",
            subdomains: "abc",
            detectRetina: false,
            tms: false,
            opacity: 1,
        }
    );
    tile_layer_0b29862e96a1f5c6c48ccd35d941cb97.addTo(map_befff7fd11199784079e61338f4d633f);

    // 2. 【追加の改良】東京駅の位置にマーカー（ピン）を表示するコードを追加しました
    var marker = L.marker([35.6812, 139.7671]).addTo(map_befff7fd11199784079e61338f4d633f);
    marker.bindPopup("<b>東京駅</b><br>ここに住所を設定しました。").openPopup();

</script>
</html>
